name: Test Project 2
on: [push,workflow_dispatch]

jobs:
    test:
     runs-on: ubuntu-latest
     steps:
        - name: Get Code
          uses: actions/checkout@v4 

        - name: Install Nodejs
          uses: actions/setup-node@v3
          with:
               node-version: 18
        - name: Install dependencies
          run: npm ci
        - name: Run tests
          run: npm test
    deploy:

     needs: test
     runs-on: ubuntu-latest
     steps:
        - name: Get Code
          uses: actions/checkout@v4 

        - name: Install Nodejs
          uses: actions/setup-node@v3
          with:
               node-version: 18
        - name: Install dependencies
          run: npm ci
        - name: Build Project
          run: npm run build
        - name: Deploy
          run : echo "Deploying.."


         
    

              

